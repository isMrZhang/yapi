name: node-22-24

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node:
          - 22
          - 24
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: corepack enable
      - run: corepack prepare pnpm@9.0.0 --activate
      # 部分可选依赖（例如 watcher/tree-sitter 链路）在特定 Node/平台下可能触发原生编译，CI 统一补齐工具链避免偶发失败
      - run: sudo apt-get update
      - run: sudo apt-get install -y python3 make g++
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm run build-client
      # dev-client 冒烟：仅验证能启动（使用 timeout 避免 CI 长驻）；放在 Node 24 上跑一次即可覆盖新版本行为
      - if: matrix.node == 24
        run: timeout 15s pnpm run dev-client || test $? -eq 124
